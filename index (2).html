<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StudyTools 7.5 Pro Max</title>
<style>
body{font-family:system-ui;background:#0f172a;color:#fff;margin:0;padding:20px}
.wrap{max-width:1200px;margin:auto}
.card{background:#1e293b;padding:16px;border-radius:18px;margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}
input,textarea,button,select{width:100%;padding:10px;margin:4px 0;border-radius:10px;border:none}
button{cursor:pointer}.badge{display:inline-block;background:#334155;padding:6px 10px;border-radius:999px;margin:3px}
#timer{font-size:48px;text-align:center}
.progress{background:#334155;height:18px;border-radius:99px;overflow:hidden}
.bar{background:#22c55e;height:100%}
</style></head><body>
<div class="wrap">
<h1>📚 StudyTools 7.5 Pro Max</h1>

<div class="grid">
<div class="card">
<h2>🍅 포모도로</h2>
<input id="study" type="number" value="50">
<input id="rest" type="number" value="10">
<div id="timer">50:00</div>
<button onclick="startTimer()">시작</button>
<button onclick="pauseTimer()">일시정지</button>
<button onclick="resetTimer()">초기화</button>
</div>

<div class="card">
<h2>🎮 레벨 시스템</h2>
<p>레벨: <span id="level">1</span></p>
<p>XP: <span id="xp">0</span></p>
<div class="progress"><div id="xpbar" class="bar" style="width:0%"></div></div>
</div>
</div>

<div class="card">
<h2>📚 과목별 공부 시간</h2>
<input id="sub" placeholder="과목">
<input id="mins" type="number" placeholder="분">
<button onclick="addSub()">추가</button>
<div id="subs"></div>
</div>

<div class="card">
<h2>🏆 업적</h2>
<div id="badges"></div>
</div>

<div class="card">
<h2>🎯 목표 관리</h2>
<input id="goal" placeholder="목표">
<button onclick="addGoal()">추가</button>
<div id="goals"></div>
</div>

<div class="card">
<h2>📝 오답노트</h2>
<textarea id="wrong" rows="8"></textarea>
<button onclick="saveWrong()">저장</button>
</div>

<div class="card">
<h2>🃏 암기카드</h2>
<input id="q" placeholder="문제">
<input id="a" placeholder="정답">
<button onclick="addCard()">추가</button>
<div id="cards"></div>
</div>

<div class="card">
<h2>📅 공부 기록</h2>
<input id="day" type="date">
<button onclick="addDay()">기록</button>
<div id="days"></div>
<p>연속 공부일: <span id="streak">0</span>일</p>
</div>

<div class="card">
<h2>💡 동기부여</h2>
<button onclick="motivate()">새 문구</button>
<p id="mot"></p>
</div>
</div>

<script>
let remain=3000,t;
function draw(){timer.innerText=String(Math.floor(remain/60)).padStart(2,'0')+":"+String(remain%60).padStart(2,'0')}
function startTimer(){clearInterval(t);t=setInterval(()=>{remain--;draw();if(remain<=0){gainXP(50);remain=study.value*60;alert("세션 완료!");}},1000)}
function pauseTimer(){clearInterval(t)}
function resetTimer(){clearInterval(t);remain=study.value*60;draw()} resetTimer();

function gainXP(v){let xp=+(localStorage.xp||0)+v;localStorage.xp=xp;updateXP();}
function updateXP(){
let xp=+(localStorage.xp||0); document.getElementById('xp').innerText=xp;
let lv=Math.floor(xp/100)+1; level.innerText=lv;
xpbar.style.width=(xp%100)+'%';
let b=[]; if(xp>=100)b.push("첫 레벨업"); if(xp>=500)b.push("집중 학습자"); if(xp>=1000)b.push("공부 마스터");
badges.innerHTML=b.map(x=>'<span class="badge">'+x+'</span>').join('');
} updateXP();

function addSub(){
let d=JSON.parse(localStorage.subs||'{}');
d[sub.value]=(d[sub.value]||0)+Number(mins.value);
localStorage.subs=JSON.stringify(d);showSubs();
}
function showSubs(){let d=JSON.parse(localStorage.subs||'{}');subs.innerHTML=Object.entries(d).map(([k,v])=>k+' : '+v+'분').join('<br>')} showSubs();

function addGoal(){let g=JSON.parse(localStorage.goals||'[]');g.push(goal.value);localStorage.goals=JSON.stringify(g);showGoals();}
function showGoals(){goals.innerHTML=JSON.parse(localStorage.goals||'[]').map(x=>'🎯 '+x).join('<br>')} showGoals();

wrong.value=localStorage.wrong||'';
function saveWrong(){localStorage.wrong=wrong.value;alert('저장 완료');}

function addCard(){
let c=JSON.parse(localStorage.cards||'[]');
c.push({q:document.getElementById('q').value,a:document.getElementById('a').value});
localStorage.cards=JSON.stringify(c);showCards();
}
function showCards(){
cards.innerHTML=JSON.parse(localStorage.cards||'[]').map(x=>'<details><summary>'+x.q+'</summary>'+x.a+'</details>').join('');
} showCards();

function addDay(){
let d=JSON.parse(localStorage.days||'[]');
if(!d.includes(day.value)) d.push(day.value);
localStorage.days=JSON.stringify(d);
days.innerHTML=d.join('<br>');
streak.innerText=d.length;
}

const msgs=[
"오늘의 노력이 내일의 실력을 만든다.","꾸준함은 가장 강력한 무기다.","포기하지 않으면 반드시 성장한다.",
"작은 습관이 큰 변화를 만든다.","어제보다 조금 더 나아지자.","지금의 집중이 미래를 바꾼다.",
"노력은 결과로 이어진다.","배움은 최고의 투자다.","실패는 성장의 과정이다.","계속 전진하자.",
"한 페이지 더 읽자.","한 문제 더 풀자.","오늘도 충분히 해낼 수 있다.","실력은 반복에서 나온다.",
"꾸준함이 재능을 이긴다.","미래의 자신이 고마워할 선택을 하자.","오늘의 공부는 결코 사라지지 않는다."
];
function motivate(){mot.innerText=msgs[Math.floor(Math.random()*msgs.length)]}
</script></body></html>
