<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTools</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

h1{
text-align:center;
}

input{
padding:10px;
width:70%;
border:none;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:3px;
}

.add{
background:#22c55e;
color:white;
}

.timer-btn{
background:#3b82f6;
color:white;
}

ul{
padding-left:20px;
}

li{
margin:8px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 StudyTools</h1>

<div class="card">
<h2>⏱ 공부 타이머</h2>
<h1 id="timer">25:00</h1>
<button class="timer-btn" onclick="startTimer()">시작</button>
<button class="timer-btn" onclick="resetTimer()">초기화</button>
</div>

<div class="card">
<h2>✅ 할 일 목록</h2>

<input id="todoInput" placeholder="할 일을 입력하세요">
<button class="add" onclick="addTodo()">추가</button>

<ul id="todoList"></ul>
</div>

</div>

<script>
let time=1500;
let interval;

function updateTimer(){
let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");
}

function startTimer(){
clearInterval(interval);

interval=setInterval(()=>{
if(time>0){
time--;
updateTimer();
}
},1000);
}

function resetTimer(){
clearInterval(interval);
time=1500;
updateTimer();
}

function addTodo(){
const input=document.getElementById("todoInput");

if(input.value.trim()=="") return;

const li=document.createElement("li");
li.textContent=input.value;

document.getElementById("todoList").appendChild(li);

input.value="";
}

updateTimer();
</script>

</body>
</html>
