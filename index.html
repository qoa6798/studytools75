<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTools</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#07152f;
color:white;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:#18253d;
padding:25px;
margin-bottom:20px;
border-radius:15px;
}

h1{
text-align:center;
margin-bottom:25px;
}

h2{
margin-bottom:15px;
}

.timer{
font-size:60px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

.start{
background:#3b82f6;
color:white;
}

.stop{
background:#ef4444;
color:white;
}

.reset{
background:#6b7280;
color:white;
}

.add{
background:#22c55e;
color:white;
}

input{
padding:10px;
border-radius:8px;
border:none;
}

#todoInput{
width:80%;
}

ul{
margin-top:15px;
}

li{
margin-bottom:10px;
}

.progress{
width:100%;
height:20px;
margin-top:15px;
}

.stats{
font-size:18px;
line-height:2;
}

.quote{
font-size:18px;
color:#facc15;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 StudyTools</h1>

<div class="card">
<h2>🔥 오늘의 동기부여</h2>

<p class="quote" id="quote">
버튼을 눌러 동기부여를 받아보세요!
</p>

<div style="text-align:center;margin-top:15px;">
<button id="motivationBtn"
style="background:#facc15;color:black;">
🎲 동기부여 받기
</button>
</div>

</div>

<div class="card">

<h2>⏱ 공부 타이머</h2>

<label>공부 시간(분)</label><br><br>

<input type="number" id="minutesInput" value="25" min="1" max="999">

<div class="timer" id="timer">25:00</div>

<div style="text-align:center;">
<button class="start" onclick="startTimer()">시작</button>
<button class="stop" onclick="stopTimer()">멈춤</button>
<button class="reset" onclick="resetTimer()">초기화</button>
</div>

<progress id="progressBar" class="progress" value="0" max="100"></progress>

</div>

<div class="card">

<h2>📊 공부 통계</h2>

<div class="stats">
총 공부 시간 : <span id="totalStudy">0</span>분<br>
완료한 공부 세션 : <span id="sessionCount">0</span>회
</div>

</div>

<div class="card">

<h2>✅ 할 일 목록</h2>

<input type="text" id="todoInput" placeholder="할 일을 입력하세요">
<button class="add" onclick="addTodo()">추가</button>

<ul id="todoList"></ul>

</div>

</div>

<script>

const quotes = [
"오늘의 1시간이 미래의 나를 만든다.",
"포기하지 않는 사람이 결국 이긴다.",
"작은 노력도 매일 쌓이면 큰 결과가 된다.",
"지금의 집중이 내일의 자신감을 만든다.",
"성공은 꾸준함이 만든 습관의 결과다.",
"남들보다 조금 더 버티면 반드시 성장한다.",
"노력은 절대 배신하지 않는다.",
"시작이 반이다.",
"포기하지 않으면 실패도 아니다.",
"지금 하는 공부가 미래를 바꾼다.",
"천천히 가도 멈추지만 않으면 된다.",
"성공은 작은 습관의 반복이다.",
"오늘의 땀이 내일의 결과다.",
"할 수 있다고 믿는 순간 가능성은 시작된다.",
"어제보다 나아진 오늘이면 충분하다."
];

let lastQuote = -1;

function showRandomQuote(){

let random;

do{
random = Math.floor(Math.random()*quotes.length);
}
while(random === lastQuote && quotes.length > 1);

lastQuote = random;

document.getElementById("quote").innerText =
quotes[random];
}

document.getElementById("motivationBtn")
.addEventListener("click",showRandomQuote);

showRandomQuote();
  
let timer;
let totalSeconds=1500;
let originalSeconds=1500;

let totalStudy =
parseInt(localStorage.getItem("totalStudy")) || 0;

let sessionCount =
parseInt(localStorage.getItem("sessionCount")) || 0;

document.getElementById("totalStudy").innerText = totalStudy;
document.getElementById("sessionCount").innerText = sessionCount;

function updateDisplay(){

let minutes=Math.floor(totalSeconds/60);
let seconds=totalSeconds%60;

document.getElementById("timer").innerText=
String(minutes).padStart(2,"0")+":"+
String(seconds).padStart(2,"0");

let progress =
((originalSeconds-totalSeconds)/originalSeconds)*100;

document.getElementById("progressBar").value=
progress;
}

function startTimer(){

if(timer) return;

if(totalSeconds<=0){

let mins =
parseInt(document.getElementById("minutesInput").value);

totalSeconds=mins*60;
originalSeconds=mins*60;
}

timer=setInterval(()=>{

if(totalSeconds>0){

totalSeconds--;
updateDisplay();

}else{

clearInterval(timer);
timer=null;

let mins =
parseInt(document.getElementById("minutesInput").value);

totalStudy += mins;
sessionCount++;

localStorage.setItem("totalStudy",totalStudy);
localStorage.setItem("sessionCount",sessionCount);

document.getElementById("totalStudy").innerText=totalStudy;
document.getElementById("sessionCount").innerText=sessionCount;

alert("🎉 공부 완료! 수고했어요!");

}

},1000);

}

function stopTimer(){
clearInterval(timer);
timer=null;
}

function resetTimer(){

clearInterval(timer);
timer=null;

let mins =
parseInt(document.getElementById("minutesInput").value);

totalSeconds=mins*60;
originalSeconds=mins*60;

updateDisplay();
}

updateDisplay();

function addTodo(){

let input=document.getElementById("todoInput");

if(input.value.trim()==="") return;

let todos=
JSON.parse(localStorage.getItem("todos")) || [];

todos.push(input.value);

localStorage.setItem("todos",
JSON.stringify(todos));

input.value="";

loadTodos();
}

function loadTodos(){

let list=document.getElementById("todoList");

list.innerHTML="";

let todos=
JSON.parse(localStorage.getItem("todos")) || [];

todos.forEach((todo,index)=>{

let li=document.createElement("li");

li.innerHTML=
`${todo}
<button onclick="deleteTodo(${index})"
style="margin-left:10px;background:red;color:white;border:none;padding:5px 10px;border-radius:5px;">
삭제
</button>`;

list.appendChild(li);

});
}

function deleteTodo(index){

let todos=
JSON.parse(localStorage.getItem("todos")) || [];

todos.splice(index,1);

localStorage.setItem("todos",
JSON.stringify(todos));

loadTodos();
}

loadTodos();

</script>

</body>
</html>
