<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTools Pro</title>

<style>
body{
    background:#111827;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding:30px;
}

.container{
    max-width:500px;
    margin:auto;
}

.timer{
    font-size:70px;
    margin:20px 0;
}

input{
    width:80px;
    padding:10px;
    font-size:18px;
    text-align:center;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.start{background:#22c55e;color:white;}
.stop{background:#ef4444;color:white;}
.reset{background:#3b82f6;color:white;}
.motive{background:#f59e0b;color:white;}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 StudyTools Pro</h1>

<div class="card">
<h2 id="mode">공부중</h2>

<div class="timer" id="timer">25:00</div>

<input id="minutesInput" type="number" value="25">

<br><br>

<button class="start" onclick="startTimer()">시작</button>
<button class="stop" onclick="stopTimer()">멈춤</button>
<button class="reset" onclick="resetTimer()">초기화</button>

<br><br>

<button class="motive" onclick="showMotivation()">
🔥 동기부여
</button>

<p id="motivation"></p>
</div>

<div class="card">
<h3>통계</h3>
<p>총 공부시간: <span id="totalStudy">0</span> 분</p>
<p>완료 세션: <span id="sessionCount">0</span> 회</p>
</div>

</div>

<script>

let timer=null;
let mode="study";

const BREAK_TIME=5;

let totalSeconds=25*60;
let originalSeconds=25*60;

let totalStudy=
Number(localStorage.getItem("totalStudy"))||0;

let sessionCount=
Number(localStorage.getItem("sessionCount"))||0;

document.getElementById("totalStudy").innerText=totalStudy;
document.getElementById("sessionCount").innerText=sessionCount;

const quotes=[
"오늘의 노력이 내일의 실력이다.",
"포기하지 않으면 결국 이긴다.",
"1% 성장도 성장이다.",
"지금 시작하는 사람이 결국 앞선다.",
"미래의 나에게 투자하자.",
"할 수 있다고 믿어라."
];

function showMotivation(){
const random=
quotes[Math.floor(Math.random()*quotes.length)];

document.getElementById("motivation").innerText=random;
}

function updateDisplay(){

let min=Math.floor(totalSeconds/60);
let sec=totalSeconds%60;

document.getElementById("timer").innerText=
String(min).padStart(2,"0")+":"+
String(sec).padStart(2,"0");
}

function startTimer(){

if(timer) return;

timer=setInterval(()=>{

if(totalSeconds>0){

totalSeconds--;
updateDisplay();

}else{

clearInterval(timer);
timer=null;

if(mode==="study"){

let mins=
parseInt(document.getElementById("minutesInput").value);

totalStudy+=mins;
sessionCount++;

localStorage.setItem("totalStudy",totalStudy);
localStorage.setItem("sessionCount",sessionCount);

document.getElementById("totalStudy").innerText=totalStudy;
document.getElementById("sessionCount").innerText=sessionCount;

alert("🎉 공부 완료! 휴식 시작");

mode="break";
document.getElementById("mode").innerText="휴식중";

totalSeconds=BREAK_TIME*60;

updateDisplay();

startTimer();

}else{

alert("☕ 휴식 끝! 공부 시작");

mode="study";
document.getElementById("mode").innerText="공부중";

let mins=
parseInt(document.getElementById("minutesInput").value);

totalSeconds=mins*60;

updateDisplay();

startTimer();
}

}

},1000);

}

function stopTimer(){
clearInterval(timer);
timer=null;
}

function resetTimer(){

clearInterval(timer);
timer=null;

mode="study";

document.getElementById("mode").innerText="공부중";

let mins=
parseInt(document.getElementById("minutesInput").value);

totalSeconds=mins*60;

updateDisplay();
}

updateDisplay();

</script>

</body>
</html>
