<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 StudyTools</title>

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:30px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#1e1e1e;
    padding:20px;
    border-radius:15px;
}

h1{
    color:#4CAF50;
}

input{
    width:80px;
    padding:8px;
    margin:5px;
    border:none;
    border-radius:5px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.start{
    background:#4CAF50;
    color:white;
}

.break{
    background:#2196F3;
    color:white;
}

.motivation{
    background:#ff9800;
    color:white;
}

#timer{
    font-size:50px;
    margin:20px;
}

#status{
    font-size:20px;
    margin-top:10px;
}

#quote{
    margin-top:20px;
    font-size:18px;
    color:#ffd54f;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 StudyTools</h1>

<div>
공부 시간(분)
<input type="number" id="studyTime" value="25">
</div>

<div>
휴식 시간(분)
<input type="number" id="breakTime" value="5">
</div>

<button class="start" onclick="startStudy()">공부 시작</button>
<button class="break" onclick="startBreak()">휴식 시작</button>
<button class="motivation" onclick="showQuote()">동기부여</button>

<div id="timer">00:00</div>
<div id="status">대기 중</div>

<div id="quote"></div>

</div>

<script>

let timer;
let timeLeft=0;

const quotes=[
"포기하지 마라. 오늘의 노력이 내일의 결과다.",
"성공은 작은 노력이 반복된 결과다.",
"지금 힘들어도 미래의 너는 고마워할 것이다.",
"꿈은 행동으로 이루어진다.",
"오늘 공부한 1시간이 미래를 바꾼다.",
"실패는 끝이 아니라 성장의 과정이다.",
"꾸준함이 재능을 이긴다.",
"할 수 있다고 믿는 순간 절반은 성공이다.",
"오늘의 선택이 내일의 나를 만든다.",
"천천히 가도 멈추지만 않으면 된다."
];

function showQuote(){
    const random=Math.floor(Math.random()*quotes.length);
    document.getElementById("quote").innerText=quotes[random];
}

function startStudy(){
    clearInterval(timer);

    let minutes=parseInt(document.getElementById("studyTime").value);

    if(isNaN(minutes)||minutes<=0){
        alert("공부 시간을 입력하세요.");
        return;
    }

    timeLeft=minutes*60;
    document.getElementById("status").innerText="📖 공부 중";

    startTimer();
}

function startBreak(){
    clearInterval(timer);

    let minutes=parseInt(document.getElementById("breakTime").value);

    if(isNaN(minutes)||minutes<=0){
        alert("휴식 시간을 입력하세요.");
        return;
    }

    timeLeft=minutes*60;
    document.getElementById("status").innerText="☕ 휴식 중";

    startTimer();
}

function startTimer(){

    updateDisplay();

    timer=setInterval(()=>{

        timeLeft--;

        updateDisplay();

        if(timeLeft<=0){

            clearInterval(timer);

            document.getElementById("status").innerText="✅ 완료!";

            alert("시간 종료!");
        }

    },1000);
}

function updateDisplay(){

    let minutes=Math.floor(timeLeft/60);
    let seconds=timeLeft%60;

    document.getElementById("timer").innerText=
    String(minutes).padStart(2,'0')+":"+
    String(seconds).padStart(2,'0');
}

</script>

</body>
</html>
