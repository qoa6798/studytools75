<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 StudyTools Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:600px;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

.card{
    background:#334155;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    margin-bottom:10px;
}

#timer{
    font-size:70px;
    text-align:center;
    font-weight:bold;
    margin:20px 0;
}

#status{
    text-align:center;
    font-size:20px;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-size:15px;
}

.study{background:#22c55e;}
.breakBtn{background:#3b82f6;}
.pause{background:#ef4444;}
.resume{background:#f59e0b;}
.motivation{background:#8b5cf6;}

.quote{
    margin-top:20px;
    background:#475569;
    padding:15px;
    border-radius:10px;
    text-align:center;
    min-height:60px;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:20px;
}

.stat{
    background:#334155;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.stat h3{
    color:#38bdf8;
    margin-bottom:5px;
}
</style>
</head>
<body>

<div class="container">

<h1>📚 StudyTools Pro</h1>

<div class="card">
<label>공부 시간 (분)</label>
<input type="number" id="studyTime" value="25">

<label>휴식 시간 (분)</label>
<input type="number" id="breakTime" value="5">
</div>

<div id="timer">25:00</div>

<div id="status">대기 중</div>

<div class="buttons">
<button class="study" onclick="startStudy()">공부 시작</button>
<button class="breakBtn" onclick="startBreak()">휴식 시작</button>
<button class="pause" onclick="pauseTimer()">멈춤</button>
<button class="resume" onclick="resumeTimer()">이어하기</button>
<button class="motivation" onclick="showQuote()">동기부여</button>
</div>

<div class="quote" id="quote">
🔥 오늘도 목표를 향해 한 걸음!
</div>

<div class="stats">
<div class="stat">
<h3>총 공부시간</h3>
<div id="totalStudy">0분</div>
</div>

<div class="stat">
<h3>공부 횟수</h3>
<div id="sessionCount">0회</div>
</div>
</div>

</div>

<script>

let timer;
let timeLeft = 1500;
let paused = false;
let currentMode = "";

let totalStudy =
parseInt(localStorage.getItem("totalStudy")) || 0;

let sessionCount =
parseInt(localStorage.getItem("sessionCount")) || 0;

document.getElementById("totalStudy").innerText =
totalStudy + "분";

document.getElementById("sessionCount").innerText =
sessionCount + "회";

const quotes = [
"포기하지 마라. 오늘의 노력이 내일의 결과다.",
"성공은 작은 노력이 반복된 결과다.",
"지금 힘들어도 미래의 너는 고마워할 것이다.",
"꾸준함이 재능을 이긴다.",
"오늘 공부한 1시간이 미래를 바꾼다.",
"꿈은 행동으로 이루어진다.",
"천천히 가도 멈추지만 않으면 된다.",
"할 수 있다고 믿는 순간 절반은 성공이다.",
"실패는 끝이 아니라 성장의 과정이다.",
"오늘의 선택이 내일의 나를 만든다."
];

function updateDisplay(){
    let min = Math.floor(timeLeft/60);
    let sec = timeLeft%60;

    document.getElementById("timer").innerText =
    String(min).padStart(2,"0")+":"+
    String(sec).padStart(2,"0");
}

function startStudy(){

    clearInterval(timer);

    let mins =
    parseInt(document.getElementById("studyTime").value);

    if(mins <= 0 || isNaN(mins)){
        alert("공부 시간을 입력하세요.");
        return;
    }

    currentMode = "study";
    timeLeft = mins * 60;

    document.getElementById("status").innerText =
    "📖 공부 중";

    sessionCount++;
    localStorage.setItem("sessionCount",sessionCount);

    document.getElementById("sessionCount").innerText =
    sessionCount + "회";

    startTimer();
}

function startBreak(){

    clearInterval(timer);

    let mins =
    parseInt(document.getElementById("breakTime").value);

    if(mins <= 0 || isNaN(mins)){
        alert("휴식 시간을 입력하세요.");
        return;
    }

    currentMode = "break";
    timeLeft = mins * 60;

    document.getElementById("status").innerText =
    "☕ 휴식 중";

    startTimer();
}

function startTimer(){

    paused = false;

    updateDisplay();

    timer = setInterval(() => {

        if(paused) return;

        timeLeft--;

        updateDisplay();

        if(timeLeft <= 0){

            clearInterval(timer);

            document.getElementById("status").innerText =
            "✅ 완료";

            alert("시간 종료!");
        }

    },1000);
}

function pauseTimer(){
    paused = true;
    document.getElementById("status").innerText =
    "⏸ 일시정지";
}

function resumeTimer(){
    paused = false;

    if(currentMode==="study"){
        document.getElementById("status").innerText =
        "📖 공부 중";
    }

    if(currentMode==="break"){
        document.getElementById("status").innerText =
        "☕ 휴식 중";
    }
}

function showQuote(){

    const random =
    Math.floor(Math.random()*quotes.length);

    document.getElementById("quote").innerText =
    quotes[random];
}

setInterval(()=>{

    if(currentMode==="study" && !paused && timeLeft>0){

        totalStudy += 1/60;

        localStorage.setItem(
            "totalStudy",
            Math.floor(totalStudy)
        );

        document.getElementById("totalStudy").innerText =
        Math.floor(totalStudy) + "분";
    }

},1000);

updateDisplay();

</script>

</body>
</html>
