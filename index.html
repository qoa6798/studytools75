<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTools</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#07152f;
color:white;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:#18253d;
padding:25px;
margin-bottom:20px;
border-radius:15px;
}

h1{
text-align:center;
margin-bottom:25px;
}

h2{
margin-bottom:15px;
}

.timer{
font-size:60px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

.start{
background:#3b82f6;
color:white;
}

.stop{
background:#ef4444;
color:white;
}

.reset{
background:#6b7280;
color:white;
}

.add{
background:#22c55e;
color:white;
}

input{
padding:10px;
border-radius:8px;
border:none;
}

#todoInput{
width:75%;
}

ul{
margin-top:15px;
list-style:none;
}

li{
margin-bottom:10px;
padding:10px;
background:#24344f;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.progress{
width:100%;
height:20px;
margin-top:15px;
}

.stats{
font-size:18px;
line-height:2;
}

.quote{
font-size:18px;
color:#facc15;
font-weight:bold;
text-align:center;
}

.deleteBtn{
background:#ef4444;
color:white;
padding:5px 10px;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 StudyTools</h1>

<div class="card">
<h2>🔥 오늘의 동기부여</h2>
<p class="quote" id="quote"></p>
</div>

<div class="card">
<h2>⏱ 공부 타이머</h2>

<label>공부 시간 (분)</label><br><br>

<input type="number" id="minutesInput" value="25" min="1">

<div class="timer" id="timer">25:00</div>

<div style="text-align:center;">
<button class="start" onclick="startTimer()">시작</button>
<button class="stop" onclick="stopTimer()">멈춤</button>
<button class="reset" onclick="resetTimer()">초기화</button>
</div>

<progress id="progressBar" class="progress" value="0" max="100"></progress>
</div>

<div class="card">
<h2>📊 공부 통계</h2>

<div class="stats">
총 공부 시간 : <span id="totalStudy">0</span>분<br>
완료한 공부 세션 : <span id="sessionCount">0</span>회
</div>
</div>

<div class="card">
<h2>✅ 할 일 목록</h2>

<input type="text" id="todoInput" placeholder="할 일을 입력하세요">
<button class="add" onclick="addTodo()">추가</button>

<ul id="todoList"></ul>
</div>

</div>

<script>
const quotes = [
"오늘의 1시간이 미래의 나를 만든다.",
"포기하지 않는 사람이 결국 이긴다.",
"작은 노력도 매일 쌓이면 큰 결과가 된다.",
"지금의 집중이 내일의 자신감을 만든다.",
"성공은 꾸준함이 만든 습관의 결과다.",
"남들보다 조금 더 버티면 반드시 성장한다."
];

document.getElementById("quote").innerText =
quotes[Math.floor(Math.random()*quotes.length)];

let timer = null;

let totalStudy =
parseInt(localStorage.getItem("totalStudy")) || 0;

let sessionCount =
parseInt(localStorage.getItem("sessionCount")) || 0;

document.getElementById("totalStudy").innerText = totalStudy;
document.getElementById("sessionCount").innerText = sessionCount;

let minutes =
parseInt(document.getElementById("minutesInput").value);

let totalSeconds = minutes * 60;
let originalSeconds = totalSeconds;

function updateDisplay(){

let mins = Math.floor(totalSeconds / 60);
let secs = totalSeconds % 60;

document.getElementById("timer").innerText =
String(mins).padStart(2,"0") + ":" +
String(secs).padStart(2,"0");

let progress =
((originalSeconds-totalSeconds)/originalSeconds)*100;

document.getElementById("progressBar").value = progress;
}

function startTimer(){

if(timer) return;

timer = setInterval(() => {

if(totalSeconds > 0){

totalSeconds--;
updateDisplay();

}else{

clearInterval(timer);
timer = null;

let mins =
parseInt(document.getElementById("minutesInput").value);

totalStudy += mins;
sessionCount++;

localStorage.setItem("totalStudy", totalStudy);
localStorage.setItem("sessionCount", sessionCount);

document.getElementById("totalStudy").innerText = totalStudy;
document.getElementById("sessionCount").innerText = sessionCount;

alert("🎉 공부 완료!");

}

},1000);
}

function stopTimer(){
clearInterval(timer);
timer = null;
}

function resetTimer(){

clearInterval(timer);
timer = null;

let mins =
parseInt(document.getElementById("minutesInput").value);

totalSeconds = mins * 60;
originalSeconds = totalSeconds;

updateDisplay();
}

document.getElementById("minutesInput").addEventListener("change", () => {

let mins =
parseInt(document.getElementById("minutesInput").value);

totalSeconds = mins * 60;
originalSeconds = totalSeconds;

updateDisplay();
});

function addTodo(){

let input = document.getElementById("todoInput");

if(input.value.trim() === "") return;

let todos =
JSON.parse(localStorage.getItem("todos")) || [];

todos.push(input.value);

localStorage.setItem(
"todos",
JSON.stringify(todos)
);

input.value = "";

loadTodos();
}

function deleteTodo(index){

let todos =
JSON.parse(localStorage.getItem("todos")) || [];

todos.splice(index,1);

localStorage.setItem(
"todos",
JSON.stringify(todos)
);

loadTodos();
}

function loadTodos(){

let list =
document.getElementById("todoList");

list.innerHTML = "";

let todos =
JSON.parse(localStorage.getItem("todos")) || [];

todos.forEach((todo,index)=>{

let li = document.createElement("li");

li.innerHTML = `
<span>${todo}</span>
<button class="deleteBtn"
onclick="deleteTodo(${index})">
삭제
</button>
`;

list.appendChild(li);
});
}

updateDisplay();
loadTodos();
</script>

</body>
</html>
